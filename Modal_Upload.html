<style>
  /* CSS chuẩn theo thiết kế dự án Sổ Kiểm tra Nội bộ */
  #upload_modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10005; justify-content: center; align-items: center; }
  .up-container { background: white; padding: 20px; border-radius: 12px; width: 600px; max-width: 95%; box-shadow: 0 5px 20px rgba(0,0,0,0.3); font-family: "Times New Roman", serif; }
  .up-header { text-align: center; border-bottom: 2px solid #1e3a8a; margin-bottom: 15px; padding-bottom: 10px; }
  .up-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
  .up-dropzone { border: 2px dashed #3b82f6; padding: 25px; text-align: center; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
  .up-dropzone:hover { background: #eff6ff; }
  .up-dropzone.has-file { border-color: #16a34a; background-color: #dcfce7; border-style: solid; }
  
  /* Nút bấm theo hình ảnh */
  #uploadBtn { width: 100%; padding: 12px; background: #7bc4a6; color: white; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; opacity: 0.5; pointer-events: none; margin-top: 10px; transition: 0.2s; font-size: 16px; }
  #uploadBtn.active { opacity: 1; pointer-events: auto; }
  #uploadBtn.active:hover { background: #62ab8e; }
  
  .close-up { background: #ef4444; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; float: right; transition: 0.2s; }
  .close-up:hover { background: #dc2626; }
  
  #warnDelete { display:none; color:#d97706; font-size:13px; text-align:center; margin-bottom:5px; font-weight:bold; background: #fffbeb; padding: 5px; border-radius: 4px; border: 1px dashed #d97706; }
  
  .btn-create-folder { border: 1px solid #ccc; background: #f0fdf4; color: #16a34a; padding: 0 10px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px; display:flex; justify-content:center; align-items:center; transition: 0.2s; }
  .btn-create-folder:hover { background: #dcfce7; }
</style>

<div id="upload_modal">
  <div class="up-container">
    <div class="up-header">
       <h3 style="margin:0; color:#1e3a8a; font-weight:bold;">📁 CHỨNG TỪ TÀI TRỢ</h3>
    </div>
    
    <div class="up-box">
      <label class="fw-bold small mb-1" style="color:#003366;">1. Chọn thư mục lưu trữ (Trung tâm):</label>
      <div style="display:flex; gap:5px;">
          <select id="folderSelect" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px; font-family:'Times New Roman';"><option>⏳ Đang tải...</option></select>
          <button class="btn-create-folder" onclick="toggleNewFolderUI()" title="Tạo thư mục mới"><i class="bi bi-folder-plus"></i></button>
      </div>
      <div id="newFolderArea" style="display:none; margin-top:10px; background:#e0f2fe; padding:10px; border:1px dashed #0284c7; border-radius:4px;">
          <div style="display:flex; gap:5px;">
              <input type="text" id="txtNewFolderName" placeholder="Nhập tên thư mục mới..." style="flex:1; padding:6px; border:1px solid #ccc; border-radius:4px; font-family:'Times New Roman';">
              <button onclick="doCreateNewFolder()" style="background:#059669; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Tạo</button>
              <button onclick="toggleNewFolderUI()" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Hủy</button>
          </div>
          <div id="createFolderStatus" style="font-size:12px; margin-top:5px; font-weight:bold;" class="text-danger"></div>
      </div>
    </div>

    <div class="up-box">
      <label class="fw-bold small" style="display:block; margin-bottom:10px; color:#003366;">2. Chọn chế độ và phương thức tải:</label>
      
      <div style="display:flex; gap:30px; justify-content:center; margin-bottom:15px; font-weight:bold;">
        <label style="cursor:pointer;"><input type="radio" name="upMode" value="file" checked onchange="toggleUpMode()"> 📄 Chọn nhiều File lẻ</label>
        <label style="cursor:pointer;"><input type="radio" name="upMode" value="folder" onchange="changeToFolderMode()"> 📂 Cả thư mục</label>
      </div>
      
      <div style="display:flex; gap:30px; justify-content:center; padding:10px; background:#e0f2fe; border-radius:6px; margin-bottom:15px; font-weight:bold; font-size: 14.5px;">
        <label style="color:#0369a1; cursor:pointer;" title="Xóa tài liệu cũ, thay bằng tài liệu mới">
          <input type="radio" name="writeMode" value="replace" checked onchange="updateWarnDisplay()"> 🔄 Thay thế tài liệu cũ
        </label>
        <label style="color:#6b21a8; cursor:pointer;" title="Giữ tài liệu cũ, nối thêm tài liệu mới">
          <input type="radio" name="writeMode" value="append" onchange="updateWarnDisplay()"> ➕ Chèn thêm tài liệu
        </label>
      </div>
      
      <div id="dropZone" class="up-dropzone" onclick="document.getElementById('fileIn').click()">
        <div id="dropZoneContent">
            <span id="fileText" style="font-weight:bold; color:#333; font-size:16px;">Nhấn để chọn file</span>
        </div>
        <input type="file" id="fileIn" style="display:none" onchange="fileSel(this)" multiple>
      </div>
    </div>

    <div id="warnDelete">⚠️ Chứng từ cũ trên Drive sẽ bị xóa vĩnh viễn để thay thế bằng chứng từ mới!</div>

    <div id="upStatus" style="text-align:center; font-weight:bold; min-height:20px; font-size:0.95rem; margin-top:5px;"></div>
    
    <div style="margin-top:10px;">
      <button id="uploadBtn" onclick="doUpload()">BẮT ĐẦU TẢI LÊN</button>
      <button class="close-up" onclick="closeUploadModal()">ĐÓNG</button>
      <div style="clear:both"></div>
    </div>
  </div>
</div>

<script>
  var CURR_FILES = [];
  var LINK_CAN_XOA = ""; 
  var ROOT_ID = '1HgvZSYDQWQDj6ElJF4ei9HJWwHB6IEYt'; // Thư mục trung tâm của Tài trợ

  function openUploadModal() { 
     LINK_CAN_XOA = document.getElementById('i_proof_url').value || "";
     updateWarnDisplay();
     document.getElementById('upload_modal').style.display = 'flex'; 
     loadFolders();
  }

  function updateWarnDisplay() {
    const wMode = document.querySelector('input[name="writeMode"]:checked').value;
    const warnDiv = document.getElementById('warnDelete');
    if(wMode === 'replace' && LINK_CAN_XOA && LINK_CAN_XOA.trim() !== "") {
        warnDiv.style.display = 'block';
    } else {
        warnDiv.style.display = 'none';
    }
  }

  function closeUploadModal() {
     document.getElementById('upload_modal').style.display = 'none';
     document.getElementById('upStatus').innerText = "";
     document.getElementById('fileIn').value = "";
     document.getElementById('fileText').innerHTML = "Nhấn để chọn file";
     document.getElementById('dropZone').classList.remove('has-file');
     document.getElementById('warnDelete').style.display = 'none';
     document.querySelector('input[name="writeMode"][value="replace"]').checked = true;
     CURR_FILES = [];
     document.getElementById('uploadBtn').classList.remove('active');
     document.getElementById('uploadBtn').disabled = true;
     document.querySelector('input[name="upMode"][value="file"]').checked = true;
     toggleUpMode();
  }

  function loadFolders() {
     const s = document.getElementById('folderSelect');
     s.innerHTML = `<option value="">⏳ Đang tải...</option>`;
     callServer('TC_getSubFolders', {email: window.GLOBAL_EMAIL}).then(res => {
       s.innerHTML = `<option value="${ROOT_ID}">-- Thư mục gốc (Trung tâm) --</option>`;
       if(res && res.success && res.data) {
         res.data.forEach(f => { s.add(new Option("📂 " + f.name, f.id)); });
       }
     }).catch(err => console.error(err));
  }

  function toggleUpMode() {
     const inp = document.getElementById('fileIn');
     inp.removeAttribute('webkitdirectory'); inp.removeAttribute('directory'); 
     inp.setAttribute('multiple', 'multiple'); 
     resetFileInput();
  }

  function changeToFolderMode() {
     const inp = document.getElementById('fileIn');
     inp.setAttribute('webkitdirectory', ''); inp.setAttribute('directory', ''); inp.setAttribute('multiple', 'multiple');
     resetFileInput();
  }

  function resetFileInput() {
     document.getElementById('fileIn').value = "";
     document.getElementById('fileText').innerHTML = "Nhấn để chọn file";
     document.getElementById('dropZone').classList.remove('has-file');
     document.getElementById('uploadBtn').disabled = true; 
     document.getElementById('uploadBtn').classList.remove('active');
     CURR_FILES = [];
  }

  function fileSel(input) {
     if (input.files.length > 0) {
       CURR_FILES = input.files;
       const mode = document.querySelector('input[name="upMode"]:checked').value;
       
       document.getElementById('dropZone').classList.add('has-file'); 
       
       if (mode === 'folder') {
          document.getElementById('fileText').innerText = `📂 ${CURR_FILES[0].webkitRelativePath.split('/')[0]} (${CURR_FILES.length} file)`;
       } else {
          if (CURR_FILES.length === 1) {
              document.getElementById('fileText').innerText = "📄 " + CURR_FILES[0].name;
          } else {
              document.getElementById('fileText').innerText = `📄 Đã chọn ${CURR_FILES.length} file lẻ`;
          }
       }
       document.getElementById('uploadBtn').disabled = false;
       document.getElementById('uploadBtn').classList.add('active');
     }
  }

  // Hàm đọc file ra chuỗi base64 (Hỗ trợ upload tuần tự)
  function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = e => resolve(e.target.result.split(',')[1]);
          r.onerror = err => reject(err);
          r.readAsDataURL(file);
      });
  }

  async function doUpload() {
     if (!CURR_FILES || CURR_FILES.length === 0) return;
     const btn = document.getElementById('uploadBtn'), st = document.getElementById('upStatus');
     const fId = document.getElementById('folderSelect').value || ROOT_ID; 
     const mode = document.querySelector('input[name="upMode"]:checked').value;
     
     const wMode = document.querySelector('input[name="writeMode"]:checked').value;
     const urlToDel = (wMode === 'replace') ? LINK_CAN_XOA : "";
     
     btn.classList.remove('active');
     btn.disabled = true;
     st.style.color = "blue"; 
     
     // TRƯỜNG HỢP 1: TẢI FILE LẺ (1 FILE HOẶC NHIỀU FILE)
     if (mode === 'file') {
         let finalUrls = [];
         let finalNames = [];
         
         for (let i = 0; i < CURR_FILES.length; i++) {
             let file = CURR_FILES[i];
             st.innerText = `⏳ Đang xử lý tải lên ${i + 1}/${CURR_FILES.length}...`;
             
             try {
                 let b64 = await readFileAsBase64(file);
                 // LƯU Ý: Chỉ gửi lệnh xóa file cũ ở lần upload đầu tiên để tránh lỗi
                 let currentUrlToDel = (i === 0) ? urlToDel : "";
                 
                 let res = await callServer('TC_uploadProof', {
                     base64Data: b64, fileName: file.name, mimeType: file.type, 
                     targetFolderId: fId, oldUrl: currentUrlToDel, email: window.GLOBAL_EMAIL
                 });
                 
                 if (res.success) {
                     finalUrls.push(res.url);
                     finalNames.push(res.name);
                 } else {
                     throw new Error(res.msg);
                 }
             } catch (err) {
                 handleUpResult({success: false, msg: err.message}, st, btn);
                 return; // Dừng lại nếu có lỗi
             }
         }
         
         // Nếu chạy hết vòng lặp thành công
         handleUpResult({
             success: true, 
             url: finalUrls.join(", "), 
             name: finalNames.join(" + ")
         }, st, btn, wMode);

     } 
     // TRƯỜNG HỢP 2: TẢI CẢ THƯ MỤC
     else { 
       const folderName = CURR_FILES[0].webkitRelativePath.split('/')[0];
       let filesData = []; let count = 0;
       st.innerText = `⏳ Đang nén ${CURR_FILES.length} file trong thư mục...`;
       
       Array.from(CURR_FILES).forEach(file => {
          const r = new FileReader();
          r.onload = e => {
             filesData.push({ fileName: file.name, mimeType: file.type, data: e.target.result.split(',')[1] });
             count++;
             if (count === CURR_FILES.length) {
                st.innerText = "⏳ Đang gửi thư mục lên Drive trung tâm...";
                callServer('TC_uploadFolderProof', {targetFolderId: fId, folderName: folderName, filesData: filesData, oldUrl: urlToDel, email: window.GLOBAL_EMAIL})
                  .then(res => { handleUpResult(res, st, btn, wMode); })
                  .catch(err => { handleUpResult({success:false, msg: err.message}, st, btn); });
             }
          };
          r.readAsDataURL(file);
       });
     }
  }

  function handleUpResult(res, st, btn, wMode = 'replace') {
     if (res.success) {
       st.style.color = "green";
       st.innerText = "✅ Tải lên thành công"; 
       
       const oldUrl = document.getElementById('i_proof_url').value;
       const oldName = document.getElementById('i_proof_name').value;
       
       // Gộp link nếu chọn Chèn Thêm, ngược lại Thay thế
       if (wMode === 'append' && oldUrl) {
          document.getElementById('i_proof_url').value = oldUrl + ", " + res.url;
          document.getElementById('i_proof_name').value = oldName + " + " + res.name;
       } else {
          document.getElementById('i_proof_url').value = res.url;
          document.getElementById('i_proof_name').value = res.name;
       }
       
       document.getElementById('preview-text').innerText = "Đã tải xong";
       // Nếu có nhiều link, chỉ lấy link đầu tiên gán vào thẻ <a> để xem trước
       document.getElementById('btn-preview').href = res.url.split(',')[0];
       document.getElementById('preview-area').style.display = 'block';
       document.getElementById('warnDelete').style.display = 'none';
       
       setTimeout(closeUploadModal, 1000);
     } else {
       st.style.color = "red";
       st.innerText = "❌ " + (res.msg || "Lỗi không xác định"); 
       btn.classList.add('active');
       btn.disabled = false;
     }
  }

  function toggleNewFolderUI(){ var a=document.getElementById('newFolderArea'); a.style.display=a.style.display==='none'?'block':'none'; }
  
  function doCreateNewFolder(){ 
    var n=document.getElementById('txtNewFolderName').value;
    var p=document.getElementById('folderSelect').value || ROOT_ID; 
    if(!n) return; 
    document.getElementById('createFolderStatus').innerText = "⏳ Đang tạo...";
    
    callServer('TC_createNewFolder', {parentId: p, name: n, email: window.GLOBAL_EMAIL}).then(res => { 
       if(res.success){ 
          var s=document.getElementById('folderSelect'); 
          s.add(new Option("📂 " + res.name, res.id)); 
          s.value=res.id; 
          document.getElementById('txtNewFolderName').value = "";
          document.getElementById('createFolderStatus').innerText = "";
          toggleNewFolderUI(); 
       } else {
          document.getElementById('createFolderStatus').innerText = "❌ Lỗi: " + res.msg;
       }
    }).catch(err => {
        document.getElementById('createFolderStatus').innerText = "❌ Lỗi: " + err.message;
    });
  }
</script>

<style>
  /* CSS riêng cho Modal Upload (Mượn từ Sổ Kiểm tra nội bộ) */
  #upload_modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10005; justify-content: center; align-items: center; }
  .up-container { background: white; padding: 20px; border-radius: 12px; width: 600px; max-width: 95%; box-shadow: 0 5px 20px rgba(0,0,0,0.3); font-family: "Times New Roman", serif; }
  .up-header { text-align: center; border-bottom: 2px solid #1e3a8a; margin-bottom: 15px; padding-bottom: 5px; }
  .up-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .up-dropzone { border: 2px dashed #3b82f6; padding: 25px; text-align: center; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
  .up-dropzone:hover { background: #eff6ff; }
  .up-dropzone.has-file { border-color: #16a34a; background-color: #dcfce7; border-style: solid; }
  #uploadBtn { width: 100%; padding: 12px; background: #059669; color: white; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; opacity: 0.5; pointer-events: none; margin-top: 10px; transition: 0.2s; }
  #uploadBtn.active { opacity: 1; pointer-events: auto; }
  #uploadBtn.active:hover { background: #047857; }
  .close-up { background: #ef4444; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
  .close-up:hover { background: #dc2626; }
  #warnDelete { display:none; color:#d97706; font-size:13px; text-align:center; margin-bottom:5px; font-weight:bold; background: #fffbeb; padding: 5px; border-radius: 4px; border: 1px dashed #d97706; }
  
  .btn-create-folder { border: 1px solid #ccc; background: #f0fdf4; color: #16a34a; padding: 0 10px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px; display:flex; justify-content:center; align-items:center; transition: 0.2s; }
  .btn-create-folder:hover { background: #dcfce7; }
</style>

<div id="upload_modal">
  <div class="up-container">
    <div class="up-header">
       <h4 style="margin:0; color:#1e3a8a; font-weight:bold;">📁 TẢI CHỨNG TỪ TÀI TRỢ</h4>
    </div>
    
    <div class="up-box">
      <label class="fw-bold small mb-1" style="color:#003366;">1. Thư mục lưu trữ (Trung tâm):</label>
      <div style="display:flex; gap:5px;">
          <select id="folderSelect" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px; font-family:'Times New Roman';"><option>⏳ Đang tải...</option></select>
          <button class="btn-create-folder" onclick="toggleNewFolderUI()" title="Tạo thư mục mới"><i class="bi bi-folder-plus"></i></button>
      </div>
      <div id="newFolderArea" style="display:none; margin-top:10px; background:#e0f2fe; padding:10px; border:1px dashed #0284c7; border-radius:4px;">
          <div style="display:flex; gap:5px;">
              <input type="text" id="txtNewFolderName" placeholder="Nhập tên thư mục mới..." style="flex:1; padding:6px; border:1px solid #ccc; border-radius:4px; font-family:'Times New Roman';">
              <button onclick="doCreateNewFolder()" style="background:#059669; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Tạo</button>
              <button onclick="toggleNewFolderUI()" style="background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Hủy</button>
          </div>
          <div id="createFolderStatus" style="font-size:12px; margin-top:5px; font-weight:bold;" class="text-danger"></div>
      </div>
    </div>

    <div class="up-box">
      <label class="fw-bold small" style="display:block; margin-bottom:10px; color:#003366;">2. Chế độ tải:</label>
      <div style="display:flex; gap:20px; justify-content:center; margin-bottom:15px; font-weight:bold;">
        <label style="cursor:pointer;"><input type="radio" name="upMode" value="file" checked onchange="toggleUpMode()"> 📄 Chọn File lẻ</label>
        <label style="cursor:pointer;"><input type="radio" name="upMode" value="folder" onchange="toggleUpMode()"> 📂 Cả thư mục</label>
      </div>
      
      <div id="dropZone" class="up-dropzone" onclick="document.getElementById('fileIn').click()">
        <div id="dropZoneContent">
            <i class="bi bi-cloud-arrow-up text-primary" style="font-size: 40px;"></i><br>
            <span id="fileText" style="font-weight:bold; color:#555;">Nhấn vào đây để chọn file</span>
        </div>
        <input type="file" id="fileIn" style="display:none" onchange="fileSel(this)">
      </div>
    </div>

    <div id="warnDelete" style="display:none; color:#d97706; font-size:13px; text-align:center; margin-bottom:5px; font-weight:bold; background: #fffbeb; padding: 5px; border-radius: 4px; border: 1px dashed #d97706;">
       ⚠️ Đã có chứng từ. Nếu tải tiếp, file cũ trên hệ thống sẽ bị thay thế!
    </div>

    <div id="upStatus" style="text-align:center; font-weight:bold; min-height:20px; font-size:0.9rem; margin-top:5px;"></div>
    
    <div style="display:flex; gap:10px; margin-top:10px;">
      <button id="uploadBtn" onclick="doUpload()" disabled>BẮT ĐẦU TẢI LÊN</button>
      <button class="close-up" onclick="closeUploadModal()">ĐÓNG</button>
    </div>
  </div>
</div>

<script>
  var CURR_FILES = [];
  var LINK_CAN_XOA = ""; 
  var ROOT_ID = '1HgvZSYDQWQDj6ElJF4ei9HJWwHB6IEYt'; // Thư mục trung tâm của Tài trợ

  function openUploadModal() { 
     LINK_CAN_XOA = document.getElementById('i_proof_url').value || "";
     if(LINK_CAN_XOA) document.getElementById('warnDelete').style.display = 'block';
     else document.getElementById('warnDelete').style.display = 'none';
     document.getElementById('upload_modal').style.display = 'flex'; 
     loadFolders();
  }

  function closeUploadModal() {
     document.getElementById('upload_modal').style.display = 'none';
     document.getElementById('upStatus').innerText = "";
     document.getElementById('fileIn').value = "";
     document.getElementById('fileText').innerHTML = "Nhấn vào đây để chọn file";
     document.getElementById('warnDelete').style.display = 'none';
     CURR_FILES = [];
     document.getElementById('uploadBtn').classList.remove('active');
     document.getElementById('uploadBtn').disabled = true;
     document.querySelector('input[name="upMode"][value="file"]').checked = true;
     toggleUpMode();
  }

  function loadFolders() {
     const s = document.getElementById('folderSelect');
     s.innerHTML = `<option value="">⏳ Đang tải...</option>`;
     callServer('TC_getSubFolders', {email: window.GLOBAL_EMAIL}).then(res => {
       s.innerHTML = `<option value="${ROOT_ID}">-- Thư mục gốc (Trung tâm) --</option>`;
       if(res && res.success && res.data) {
         res.data.forEach(f => { s.add(new Option("📂 " + f.name, f.id)); });
       }
     }).catch(err => console.error(err));
  }

  function toggleUpMode() {
     const mode = document.querySelector('input[name="upMode"]:checked').value;
     const inp = document.getElementById('fileIn');
     inp.value = ""; document.getElementById('fileText').innerHTML = "Nhấn vào đây để chọn file";
     document.getElementById('uploadBtn').disabled = true; 
     document.getElementById('uploadBtn').classList.remove('active');
     CURR_FILES = [];
     
     if (mode === 'folder') { 
       inp.setAttribute('webkitdirectory', '');
       inp.setAttribute('directory', ''); inp.setAttribute('multiple', ''); 
     } else { 
       inp.removeAttribute('webkitdirectory'); inp.removeAttribute('directory'); inp.removeAttribute('multiple');
     }
  }

  function fileSel(input) {
     if (input.files.length > 0) {
       CURR_FILES = input.files;
       const mode = document.querySelector('input[name="upMode"]:checked').value;
       
       document.getElementById('dropZone').classList.add('has-file'); 
       
       if (mode === 'folder') {
          document.getElementById('fileText').innerText = `📂 ${CURR_FILES[0].webkitRelativePath.split('/')[0]} (${CURR_FILES.length} files)`;
       } else {
          document.getElementById('fileText').innerText = "📄 " + CURR_FILES[0].name;
       }
       document.getElementById('uploadBtn').disabled = false;
       document.getElementById('uploadBtn').classList.add('active');
     }
  }

  function doUpload() {
     if (!CURR_FILES || CURR_FILES.length === 0) return;
     const btn = document.getElementById('uploadBtn'), st = document.getElementById('upStatus');
     const fId = document.getElementById('folderSelect').value || ROOT_ID; 
     const mode = document.querySelector('input[name="upMode"]:checked').value;
     
     btn.classList.remove('active');
     btn.disabled = true;
     st.style.color = "blue"; st.innerText = "⏳ Đang xử lý tải lên...";

     if (mode === 'file') {
       const file = CURR_FILES[0];
       const r = new FileReader();
       r.onload = e => {
         const b64 = e.target.result.split(',')[1];
         callServer('TC_uploadProof', {base64Data: b64, fileName: file.name, mimeType: file.type, targetFolderId: fId, oldUrl: LINK_CAN_XOA, email: window.GLOBAL_EMAIL})
           .then(res => { handleUpResult(res, st, btn); })
           .catch(err => { handleUpResult({success:false, msg: err.message}, st, btn); });
       };
       r.readAsDataURL(file);

     } else { 
       const folderName = CURR_FILES[0].webkitRelativePath.split('/')[0];
       let filesData = []; let count = 0;
       st.innerText = `⏳ Đang đọc ${CURR_FILES.length} file...`;
       
       Array.from(CURR_FILES).forEach(file => {
          const r = new FileReader();
          r.onload = e => {
             filesData.push({ fileName: file.name, mimeType: file.type, data: e.target.result.split(',')[1] });
             count++;
             if (count === CURR_FILES.length) {
                st.innerText = "⏳ Đang gửi dữ liệu lên thư mục trung tâm...";
                callServer('TC_uploadFolderProof', {targetFolderId: fId, folderName: folderName, filesData: filesData, oldUrl: LINK_CAN_XOA, email: window.GLOBAL_EMAIL})
                  .then(res => { handleUpResult(res, st, btn); })
                  .catch(err => { handleUpResult({success:false, msg: err.message}, st, btn); });
             }
          };
          r.readAsDataURL(file);
       });
     }
  }

  function handleUpResult(res, st, btn) {
     if (res.success) {
       st.style.color = "green";
       st.innerText = "✅ Tải lên thành công"; 
       
       document.getElementById('i_proof_url').value = res.url;
       document.getElementById('i_proof_name').value = res.name;
       
       document.getElementById('preview-text').innerText = "Đã tải xong";
       document.getElementById('btn-preview').href = res.url;
       document.getElementById('preview-area').style.display = 'block';
       document.getElementById('warnDelete').style.display = 'none';
       
       setTimeout(closeUploadModal, 1000);
     } else {
       st.style.color = "red";
       st.innerText = "❌ " + (res.msg || "Lỗi không xác định"); 
       btn.classList.add('active');
       btn.disabled = false;
     }
  }

  function toggleNewFolderUI(){ var a=document.getElementById('newFolderArea'); a.style.display=a.style.display==='none'?'block':'none'; }
  
  function doCreateNewFolder(){ 
    var n=document.getElementById('txtNewFolderName').value;
    var p=document.getElementById('folderSelect').value || ROOT_ID; 
    if(!n) return; 
    document.getElementById('createFolderStatus').innerText = "⏳ Đang tạo...";
    
    callServer('TC_createNewFolder', {parentId: p, name: n, email: window.GLOBAL_EMAIL}).then(res => { 
       if(res.success){ 
          var s=document.getElementById('folderSelect'); 
          s.add(new Option("📂 " + res.name, res.id)); 
          s.value=res.id; 
          document.getElementById('txtNewFolderName').value = "";
          document.getElementById('createFolderStatus').innerText = "";
          toggleNewFolderUI(); 
       } else {
          document.getElementById('createFolderStatus').innerText = "❌ Lỗi: " + res.msg;
       }
    }).catch(err => {
        document.getElementById('createFolderStatus').innerText = "❌ Lỗi: " + err.message;
    });
  }
</script>
